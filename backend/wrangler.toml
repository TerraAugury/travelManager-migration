name = "travel-manager-api"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "travel-manager"
database_id = "36e70ba2-0aab-43ef-bc68-985d0977941f"


# Optional: AviationStack flight lookup (GET /flights/lookup?fn=XX123)
# Set with: wrangler secret put AVIATIONSTACK_API_KEY
# Leave unset to disable the lookup feature.

# Optional: AeroDataBox flight lookup via RapidAPI (GET /flights/lookup?fn=XX123&provider=aerodatabox)
# Set with: wrangler secret put AERODATABOX_API_KEY
# Leave unset to disable AeroDataBox lookup.

# FLIGHTERA_API_KEY — set via: wrangler secret put FLIGHTERA_API_KEY.
